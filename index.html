<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>МГТУ — AR-гид</title>

<script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.6.0/dist/aframe-master.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@master/aframe/build/aframe-ar.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
 --sand:#D8C2A1;
 --roof:#70747A;
 --stone:#CFC8BD;
 --bronze:#B88A4A;
 --glass:#62778D;
 --graphite:#232A34;
 --panel:rgba(26,32,40,.82);
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,sans-serif;overflow:hidden}

.logo-badge{
position:fixed;top:16px;left:16px;width:64px;height:64px;z-index:20;
background:rgba(26,32,40,.92);border:1px solid rgba(255,255,255,.15);
border-radius:50%;display:flex;align-items:center;justify-content:center;
box-shadow:0 10px 25px rgba(0,0,0,.35);overflow:hidden;
}
.logo-badge img{width:80%;height:80%;object-fit:contain}
.logo-fallback{color:white;font-weight:800}

.info-card{
position:fixed;left:50%;bottom:28px;transform:translate(-50%,24px);
width:min(92%,460px);
background:var(--panel);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.12);
border-radius:18px;
padding:18px;
color:white;
opacity:0;
transition:.4s;
z-index:20;
box-shadow:0 15px 40px rgba(0,0,0,.4);
}
.info-card.visible{opacity:1;transform:translate(-50%,0)}
.info-card .accent{color:var(--bronze)}

.hint-badge{
position:fixed;bottom:16px;right:16px;
background:var(--panel);color:white;padding:10px 16px;
border-radius:20px;z-index:20
}
.hidden{opacity:0}

.tag{
position:fixed;
background:rgba(28,35,45,.78);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.12);
color:white;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,.35);
padding:12px 16px;
display:flex;align-items:center;gap:8px;
font-size:.82rem;font-weight:600;
opacity:0;transform:translateY(10px);transition:.4s;
}
.tag.visible{opacity:1;transform:translateY(0)}
.tag .icon{
width:28px;height:28px;border-radius:50%;
background:#B88A4A;color:white;
display:flex;align-items:center;justify-content:center;
}
#tag-history{top:24%;left:8%}
#tag-institutes{top:19%;right:8%}
#tag-students{top:52%;right:6%}
</style>
</head>
<body>

<div class="logo-badge">
<img src="logo.png" onerror="this.parentElement.innerHTML='<span class=logo-fallback>МГТУ</span>'">
</div>

<div class="info-card" id="info-card">
<h2>Памятник <span class="accent">Г.И. Носову</span></h2>
<p>МГТУ основан в 1934 году. Сегодня университет объединяет 9 институтов и около 14 000 студентов. Перед главным корпусом расположен памятник Г.И. Носову.</p>
</div>

<div class="hint-badge" id="hint">Наведите камеру на маркер</div>

<div class="tag" id="tag-history"><span class="icon">🏛</span>1934 — год основания</div>
<div class="tag" id="tag-institutes"><span class="icon">🎓</span>9 институтов</div>
<div class="tag" id="tag-students"><span class="icon">👥</span>14 000+ студентов</div>

<a-scene embedded arjs="sourceType:webcam;debugUIEnabled:false" vr-mode-ui="enabled:false">
<a-entity light="type:ambient;intensity:1"></a-entity>
<a-entity light="type:directional;intensity:.6" position="1 2 1"></a-entity>

<a-marker preset="hiro" marker-handler>

<a-entity id="campus-group"
scale="0.01 0.01 0.01"
animation="property:scale;to:0.6 0.6 0.6;dur:1200;easing:easeOutElastic">

<a-entity light="type:point;color:#FFD6A0;intensity:1.2;distance:6" position="0 2 1"></a-entity>
<a-entity light="type:point;color:#FFF0D8;intensity:.8;distance:5" position="-1 1 1"></a-entity>

<a-cylinder radius="1.05" height="0.05" color="#232A34"></a-cylinder>
<a-cylinder radius="1.08" height="0.015" position="0 -0.02 0" color="#4B525C"></a-cylinder>

<a-plane width="0.24" height="1.15" rotation="-90 0 0" position="0 0.026 0.52" color="#9D9487"></a-plane>

<a-entity id="mgtu-building">
<a-box width="0.32" height="0.42" depth="0.42" position="-0.46 0.21 0" color="#D8C2A1"></a-box>
<a-box width="0.32" height="0.42" depth="0.42" position="0.46 0.21 0" color="#D8C2A1"></a-box>
<a-box width="0.34" height="0.05" depth="0.44" position="-0.46 0.445 0" color="#70747A"></a-box>
<a-box width="0.34" height="0.05" depth="0.44" position="0.46 0.445 0" color="#70747A"></a-box>
<a-box width="0.62" height="0.62" depth="0.46" position="0 0.31 0" color="#D8C2A1"></a-box>
<a-cone radius-bottom="0.46" radius-top="0" height="0.24" segments-radial="4" rotation="0 45 0" position="0 0.74 0" color="#70747A"></a-cone>

<a-box width="0.045" height="0.09" depth="0.01" color="#62778D" position="-0.2 0.16 0.236"></a-box>
<a-box width="0.045" height="0.09" depth="0.01" color="#62778D" position="-0.08 0.16 0.236"></a-box>
<a-box width="0.045" height="0.09" depth="0.01" color="#62778D" position="0.08 0.16 0.236"></a-box>
<a-box width="0.045" height="0.09" depth="0.01" color="#62778D" position="0.2 0.16 0.236"></a-box>

<a-cylinder radius="0.018" height="0.34" color="#CFC8BD" position="-0.16 0.17 0.25"></a-cylinder>
<a-cylinder radius="0.018" height="0.34" color="#CFC8BD" position="-0.05 0.17 0.25"></a-cylinder>
<a-cylinder radius="0.018" height="0.34" color="#CFC8BD" position="0.05 0.17 0.25"></a-cylinder>
<a-cylinder radius="0.018" height="0.34" color="#CFC8BD" position="0.16 0.17 0.25"></a-cylinder>

<a-box width="0.09" height="0.16" depth="0.02" position="0 0.08 0.255" color="#232A34"></a-box>
<a-box width="0.35" height="0.02" depth="0.12" position="0 0.01 0.33" color="#B7A489"></a-box>
</a-entity>

<a-entity position="0 0.06 0.45">
<a-cylinder radius="0.06" height="0.08" color="#8A8A8A"></a-cylinder>
<a-cylinder radius="0.03" height="0.18" position="0 0.13 0" color="#777"></a-cylinder>
<a-sphere radius="0.04" position="0 0.25 0" color="#777"></a-sphere>
</a-entity>

<a-cylinder radius="0.005" height="0.18" position="-0.14 0.09 0.4" color="#444"></a-cylinder>
<a-sphere radius="0.015" position="-0.14 0.18 0.4" color="#FFD08A"></a-sphere>
<a-cylinder radius="0.005" height="0.18" position="0.14 0.09 0.4" color="#444"></a-cylinder>
<a-sphere radius="0.015" position="0.14 0.18 0.4" color="#FFD08A"></a-sphere>

<a-cylinder radius="0.09" height="0.015" position="-0.22 0.02 0.35" color="#78533A"></a-cylinder>
<a-sphere radius="0.06" position="-0.22 0.07 0.35" color="#5E8753"></a-sphere>
<a-cylinder radius="0.09" height="0.015" position="0.22 0.02 0.35" color="#78533A"></a-cylinder>
<a-sphere radius="0.06" position="0.22 0.07 0.35" color="#5E8753"></a-sphere>

<a-entity id="tree-container"></a-entity>
</a-entity>
</a-marker>

<a-entity camera></a-entity>
</a-scene>

<script>
AFRAME.registerComponent('marker-handler',{
init:function(){
const c=document.getElementById('info-card');
const h=document.getElementById('hint');
const tags=[...document.querySelectorAll('.tag')];
this.el.addEventListener('markerFound',()=>{c.classList.add('visible');h.classList.add('hidden');tags.forEach(t=>t.classList.add('visible'));});
this.el.addEventListener('markerLost',()=>{c.classList.remove('visible');h.classList.remove('hidden');tags.forEach(t=>t.classList.remove('visible'));});
}
});
</script>
</body>
</html>
